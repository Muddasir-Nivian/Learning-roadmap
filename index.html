      "Practice full 45-minute mock interviews with a friend or record yourself.",
      "Cover technical questions on SQL, Python, DAX, and statistics.",
      "Cover behavioral questions on communication, stakeholder management, and working with ambiguous data.",
      "Review and fix weak areas."
    ]},
    { week: 71, tasks: [
      "[ADD NOW] Add AI certifications to your LinkedIn and resume — Microsoft Fabric Analytics Engineer Associate, Google Professional Data Engineer, or Azure AI Fundamentals.",
      "Pick the one most relevant to the companies you are targeting.",

      "This is what you hand to every recruiter and attach to every job application."
    ]},
    { week: "73-76", tasks: [

      "Continue posting on LinkedIn weekly throughout this period. Every interview that does not result in an offer is a data point — write down what questions you could not answer confidently and fill those gaps immediately."
    ]}

];

const TOTAL_TASKS = data.reduce((m, mo) => m + mo.weeks.reduce((w, wk) => w + wk.tasks.length, 0), 0);
const TOTAL_WEEKS = data.reduce((m, mo) => m + mo.weeks.length, 0);

const taskSchedule = [];
let dayAccum = 0;
data.forEach((mo, mi) => {
  mo.weeks.forEach((wk, wi) => {
    const daysPerTask = 7 / wk.tasks.length;
    wk.tasks.forEach((task, ti) => {
      taskSchedule.push({ mi, wi, ti, label: task, monthTitle: mo.title, weekLabel: `Week ${wk.week}`, startDay: dayAccum, endDay: dayAccum + daysPerTask });
      dayAccum += daysPerTask;
    });
  });
});
const TOTAL_DAYS = dayAccum;

function getKey(mi, wi, ti) { return `orrbit_m${mi}_w${wi}_t${ti}`; }
function loadChecked(mi, wi, ti) { return localStorage.getItem(getKey(mi, wi, ti)) === '1'; }
function saveChecked(mi, wi, ti, val) {
  if (val) {
    localStorage.setItem(getKey(mi, wi, ti), '1');
    const dk = `orrbit_date_${mi}_${wi}_${ti}`;
    if (!localStorage.getItem(dk)) localStorage.setItem(dk, todayStr());
  } else {
    localStorage.removeItem(getKey(mi, wi, ti));
    localStorage.removeItem(`orrbit_date_${mi}_${wi}_${ti}`);
  }
}
function getCompletionDate(mi, wi, ti) { return localStorage.getItem(`orrbit_date_${mi}_${wi}_${ti}`); }
function todayStr() { return new Date().toISOString().slice(0, 10); }

function updateProgress() {
  let totalDone = 0, weeksDone = 0, monthsDone = 0;
  data.forEach((mo, mi) => {
    let moTasks = 0, moDone = 0;
    mo.weeks.forEach((wk, wi) => {
      let wkDone = 0;
      wk.tasks.forEach((_, ti) => { if (loadChecked(mi, wi, ti)) { wkDone++; moDone++; totalDone++; } moTasks++; });
      if (wkDone === wk.tasks.length) weeksDone++;
      const wBadge = document.getElementById(`wbadge-${mi}-${wi}`);
      if (wBadge) wBadge.textContent = `${wkDone} / ${wk.tasks.length}`;
      const wIcon = document.getElementById(`wicon-${mi}-${wi}`);
      if (wIcon) {
        if (wkDone === wk.tasks.length) { wIcon.classList.add('done'); wIcon.innerHTML = CHECK_SVG; }
        else { wIcon.classList.remove('done'); wIcon.innerHTML = ''; }
      }
    });
    const moWeeksDone = mo.weeks.filter((wk, wi) => wk.tasks.every((_, ti) => loadChecked(mi, wi, ti))).length;
    if (moWeeksDone === mo.weeks.length) monthsDone++;
    const mBadge = document.getElementById(`mbadge-${mi}`);
    if (mBadge) mBadge.textContent = `${moWeeksDone} / ${mo.weeks.length}`;
    const circle = document.getElementById(`mcircle-fill-${mi}`);
    const circleText = document.getElementById(`mcircle-text-${mi}`);
    if (circle && circleText) {
      const pct = moTasks > 0 ? moDone / moTasks : 0;
      const r = 16, circ = 2 * Math.PI * r;
      circle.style.strokeDasharray = circ;
      circle.style.strokeDashoffset = circ * (1 - pct);
      circleText.textContent = Math.round(pct * 100) + '%';
    }
  });
  const pct = TOTAL_TASKS > 0 ? Math.round(totalDone / TOTAL_TASKS * 100) : 0;
  document.getElementById('overall-pct').textContent = pct + '%';
  document.getElementById('overall-bar').style.width = pct + '%';
  document.getElementById('stat-months').textContent = `${monthsDone} / 18 months`;
  document.getElementById('stat-weeks').textContent = `${weeksDone} / ${TOTAL_WEEKS} weeks`;
  document.getElementById('stat-goals').textContent = `${totalDone} / ${TOTAL_TASKS} goals`;
}

function buildRoadmap() {
  const container = document.getElementById('roadmap');
  container.innerHTML = '';
  data.forEach((mo, mi) => {
    const card = document.createElement('div');
    card.className = 'month-card'; card.id = `month-${mi}`;
    const r = 16, circ = 2 * Math.PI * r;
    card.innerHTML = `
      <div class="month-header" onclick="toggleMonth(${mi})">
        <div class="month-arrow">${ARROW_SVG}</div>
        <div class="month-title">Month ${mo.month} — ${mo.title}</div>
        <div class="month-badge" id="mbadge-${mi}">0 / ${mo.weeks.length}</div>
        <div class="month-circle"><svg viewBox="0 0 38 38">
          <circle class="circle-track" cx="19" cy="19" r="${r}"/>
          <circle class="circle-fill" id="mcircle-fill-${mi}" cx="19" cy="19" r="${r}" style="stroke-dasharray:${circ};stroke-dashoffset:${circ}"/>
          <text class="circle-text" id="mcircle-text-${mi}" x="19" y="19">0%</text>
        </svg></div>
      </div>
      <div class="month-body" id="mbody-${mi}"></div>`;
    container.appendChild(card);
    const body = document.getElementById(`mbody-${mi}`);
    mo.weeks.forEach((wk, wi) => {
      const weekCard = document.createElement('div');
      weekCard.className = 'week-card'; weekCard.id = `week-${mi}-${wi}`;
      weekCard.innerHTML = `
        <div class="week-header" onclick="toggleWeek(${mi}, ${wi})">
          <div class="week-arrow">${ARROW_SVG}</div>
          <div class="week-check-icon" id="wicon-${mi}-${wi}"></div>
          <div class="week-title">Week ${wk.week}</div>
          <div class="week-badge" id="wbadge-${mi}-${wi}">0 / ${wk.tasks.length}</div>
        </div>
        <div class="week-body" id="wbody-${mi}-${wi}"></div>`;
      body.appendChild(weekCard);
      const wbody = document.getElementById(`wbody-${mi}-${wi}`);
      wk.tasks.forEach((task, ti) => {
        const item = document.createElement('div');
        item.className = 'task-item' + (loadChecked(mi, wi, ti) ? ' checked' : '');
        item.id = `task-${mi}-${wi}-${ti}`;
        item.innerHTML = `<div class="task-checkbox">${CHECK_SVG}</div><div class="task-label">${task}</div>`;
        item.onclick = () => toggleTask(mi, wi, ti);
        wbody.appendChild(item);
      });
    });
  });
  updateProgress();
}

function toggleMonth(mi) { document.getElementById(`month-${mi}`).classList.toggle('open'); }
function toggleWeek(mi, wi) { document.getElementById(`week-${mi}-${wi}`).classList.toggle('open'); }
function toggleTask(mi, wi, ti) {
  const item = document.getElementById(`task-${mi}-${wi}-${ti}`);
  const nowChecked = !item.classList.contains('checked');
  item.classList.toggle('checked', nowChecked);
  saveChecked(mi, wi, ti, nowChecked);
  updateProgress();
}



  


buildRoadmap();
</script>
